<div class="root h-100">
    <div class="toolbar d-flex justify-content-between align-items-center px-5">
        <header>
            <h1 class="app-name fw-bold small-caps fs-1">Pokédex</h1>
        </header>
        <section class="search-bar">
            <input type="text" placeholder="Search...">
            <button class="search-btn">
                <em class="icon-btn pokedex-search"></em>
            </button>
        </section>
    </div>
    <main>
        <section class="p-5">
            <ul>
                <a href="" *ngFor="let pokemon of pokemons" class="text-decoration-none" routerLink="details/{{ pokemon.id }}">
                    <pokemon-card [pokemon]="pokemon"></pokemon-card>
                </a>
            </ul>
        </section>
        <section class="my-4 d-flex align-items-center justify-content-center">
            <button class="mb-5 load-pokemons-btn p-3 rounded border-0 text-light fw-bolder" matRipple (click)="loadPokemons()">Load more Pokémons</button>
        </section>
    </main>
</div>
