<div class="root h-100">
    <div class="toolbar d-flex justify-content-between align-items-center px-5">
        <section>
            <header>
                <h1 class="app-name fw-bold small-caps fs-1">Pokédex</h1>
            </header>
        </section>
        <section class="search-bar">
            <input type="text" placeholder="Search..." #input>
            <button class="search-btn border-0" (click)="search(input.value.toLowerCase())" matRipple>
                <em class="pokedex-search"></em>
            </button>
        </section>
    </div>
    <main>
        <section class="p-5">
            <ul>
                <a *ngFor="let pokemon of pokemons" class="text-decoration-none" routerLink="details/{{ pokemon.id }}">
                    <pokemon-card [pokemon]="pokemon"></pokemon-card>
                </a>
            </ul>
        </section>
        <section class="my-4 d-flex align-items-center justify-content-center" *ngIf="next != null">
            <button class="mb-5 load-pokemons-btn p-3 rounded border-0 text-light fw-bolder soft-blue-bg" matRipple (click)="loadPokemons()">Load more Pokémons</button>
        </section>
    </main>
</div>
