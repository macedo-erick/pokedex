<div class="root">
  <section class="{{ pokemon.types[0].name }}">
    <nav>
      <a class="border-0 bg-transparent text-light fs-2 p-0 action-btn text-decoration-none d-flex align-items-center" [routerLink]="['']">
        <em class="pokedex-arrow-back"></em>
      </a>
    </nav>
    <header class="d-flex justify-content-between">
        <div *ngIf="pokemon.id == 1"></div>
        <a class="border-0 bg-transparent text-light fs-2 p-0 action-btn text-decoration-none d-flex align-items-center" *ngIf="pokemon.id != 1" [routerLink]="['/details', pokemon.id - 1]">
            <em class="pokedex-chevron-left"></em>
        </a>
        <div class="infos d-flex align-items-center flex-column">
            <div class="top-container d-flex align-items-center h-50">
                <h1 class="text-light text-capitalize fw-bold letter-spacing-1 me-3 fs-1"> {{ pokemon.name }} </h1>
                <span class="text-light fs-4 fw-bold opacity-25"> {{ pokemon.id | formatId }} </span>
            </div>
            <div class="bottom-container w-100">
                <span *ngFor="let type of pokemon.types" class="text-capitalize fw-bold px-4 py-2 {{type.name}}-light me-2 rounded-pill text-light"> {{ type.name }}</span>
            </div>
        </div>
        <div class="img-wrap">
            <img [src]="pokemon.sprites.front_bigger" alt="{{ pokemon.name }}">
        </div>
        <a class="border-0 bg-transparent text-light fs-2 p-0 action-btn text-decoration-none d-flex align-items-center" [routerLink]="['/details/', pokemon.id + 1]" *ngIf="pokemon.id != 10228">
            <em class="pokedex-chevron-right"></em>
        </a>
    </header>
  </section>

  <main>
    <section class="d-flex top-container mb-4">
        <about-card [pokemon]="pokemon" class="me-3 w-50"></about-card>
        <stats-card [pokemon]="pokemon" class="w-50"></stats-card>
    </section>
    <section>
      <evolution-card [pokemon]="pokemon"></evolution-card>
    </section>
  </main>
</div>
