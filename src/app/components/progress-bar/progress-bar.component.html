<section class="d-flex flex-row justify-content-between">
    <span class="fw-bolder fs-6 text-capitalize w-15 label">{{ label }}</span>
    <span class="text-black-50 fs-6 text-body fw-bold value">{{ value }}</span>
    <mat-progress-bar mode="determinate" [value]="(value | formatValue)" class="progress-bar rounded-pill"></mat-progress-bar>
</section>
